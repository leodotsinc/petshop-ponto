name: Build, Push and Deploy

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run build

  build-and-push:
    needs: build-check
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: leodots
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t ghcr.io/leodots/petshop-ponto:latest .

      - name: Push Docker image
        run: |
          docker push ghcr.io/leodots/petshop-ponto:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.VPS_IP }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH using Docker Compose
        run: |
          ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.SSH_PORT }} ${{ secrets.DEPLOY_USER }}@${{ secrets.VPS_IP }} << 'ENDSSH'
            set -e
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u leodots --password-stdin
            echo "📂 Navegando para o diretório..."
            cd ~/apps/petshop-ponto
            echo "⬇️  Baixando nova imagem..."
            docker compose pull app
            echo "🛑 Parando container antigo..."
            docker stop petshop-ponto 2>/dev/null || true
            docker rm -f petshop-ponto 2>/dev/null || true
            echo "🚀 Subindo novo container..."
            docker compose up -d app
            echo "✅ Deploy concluído!"
            echo "🧹 Limpando imagens antigas..."
            docker image prune -af --filter "until=24h"
          ENDSSH

      - name: Health check
        run: |
          ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.SSH_PORT }} ${{ secrets.DEPLOY_USER }}@${{ secrets.VPS_IP }} '
            sleep 10
            if docker ps | grep -q petshop-ponto; then
              echo "✅ Container petshop-ponto está rodando"
              docker ps | grep petshop-ponto
              exit 0
            else
              echo "❌ Container falhou ao iniciar"
              docker logs petshop-ponto --tail 50
              exit 1
            fi
          '
